<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src 'self'; script-src 'self';" />
    <title>lrclrclrc</title>
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div id="card" class="card">
      <div id="drag" class="drag-handle" title="Drag to move"></div>

      <div class="controls">
        <button id="btn-clickthrough" title="Toggle click-through">☝︎</button>
        <button id="btn-quit" title="Quit">✕</button>
      </div>

      <div id="meta" class="meta">
        <span id="title" class="title">lrclrclrc</span>
        <span id="artist" class="artist">Play something in Apple Music…</span>
      </div>

      <div id="lyrics" class="lyrics">
        <div class="line prev" id="line-prev"></div>
        <div class="line current" id="line-current"></div>
        <div class="line next" id="line-next"></div>
      </div>

      <div id="status" class="status"></div>
    </div>

    <script src="overlay.js"></script>
  </body>
</html>
