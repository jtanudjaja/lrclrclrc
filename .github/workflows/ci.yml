name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Static checks
        run: npm run check

  build-mac:
    name: Build macOS DMG
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build universal DMG
        run: npm run dist
        env:
          # No Apple Developer cert in CI: produce an ad-hoc-signed build
          # instead of failing while searching for an identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: lrclrclrc-macos-dmg
          path: dist/*.dmg
          if-no-files-found: error
