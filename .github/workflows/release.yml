name: Release

# Publishes a downloadable, zipped macOS .app to the repo's Releases page.
# Trigger by pushing a version tag (git tag v0.1.0 && git push origin v0.1.0),
# or manually from the Actions tab with a tag name.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & publish macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & assemble app
        run: bash scripts/build-app.sh release
      - name: Package DMG
        run: bash scripts/make-dmg.sh
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" lrclrclrc.dmg \
            --title "lrclrclrc ${{ steps.tag.outputs.tag }}" \
            --notes "$(cat <<'NOTES'
          Native SwiftUI menu-bar app. Unsigned (no Apple Developer ID).

          To install:
          1. Open the DMG and drag **lrclrclrc** to Applications.
          2. Clear the download quarantine before opening it:
             ```
             xattr -cr /Applications/lrclrclrc.app
             ```
          3. Launch it, and grant the prompt to control the Music app.

          Prefer to build it yourself? Clone the repo and run
          `bash scripts/build-app.sh` — a locally built app needs no quarantine step.
          NOTES
          )"
