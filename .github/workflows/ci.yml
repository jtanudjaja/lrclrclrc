name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build -c release
      - name: Assemble & sign app bundle
        run: bash scripts/build-app.sh release
      - name: Verify bundle
        run: |
          test -x lrclrclrc.app/Contents/MacOS/lrclrclrc
          test -f lrclrclrc.app/Contents/Info.plist
          codesign --verify --verbose lrclrclrc.app
          echo "app bundle OK"
